<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heidi's Color Machine</title>
<style>
  :root{
    --bg: #121212;
    --panel: #1a1a1a;
    --border: #333331;
    --text: #f2efea;
    --text-dim: #8c8c87;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
    background: var(--bg);
  }

  body{
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .mono{
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
  }

  body.stage-mode, body.stage-mode *{
    cursor: none;
  }

  #stage{
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity .6s ease;
  }

  #stage.active{
    opacity: 1;
  }

  #controls{
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 1;
    transition: opacity .4s ease;
  }

  #controls.hidden{
    opacity: 0;
    pointer-events: none;
  }

  .panel{
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    box-shadow: 0 24px 70px rgba(0,0,0,.45);
  }

  .eyebrow{
    font-size: 11px;
    letter-spacing: .18em;
    color: var(--text-dim);
    margin: 0 0 14px;
  }

  h1{
    font-size: clamp(22px, 5vw, 28px);
    line-height: 1.25;
    letter-spacing: .04em;
    font-weight: 500;
    margin: 0 0 28px;
  }

  #preview{
    width: 100%;
    height: 14px;
    border-radius: 4px;
    display: block;
    margin-bottom: 28px;
  }

  .duration-label{
    font-size: 11px;
    letter-spacing: .18em;
    color: var(--text-dim);
    margin: 0 0 10px;
  }

  .duration-row{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 32px;
  }

  .time-field{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .field-label{
    font-size: 10px;
    letter-spacing: .14em;
    color: var(--text-dim);
  }

  .time-value{
    width: 2.6ch;
    text-align: center;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 24px;
    padding: 4px 2px 6px;
    outline: none;
    border-radius: 0;
  }

  .time-value:hover{
    border-bottom-color: var(--text-dim);
  }

  .time-value:focus{
    border-bottom-color: var(--text);
  }

  .time-value::-webkit-inner-spin-button,
  .time-value::-webkit-outer-spin-button{
    -webkit-appearance: none;
    margin: 0;
  }

  .time-value{
    -moz-appearance: textfield;
  }

  .colon{
    font-size: 22px;
    color: var(--text-dim);
    padding: 0 2px;
    margin-bottom: 18px;
  }

  .sr-only{
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  .start-btn{
    width: 100%;
    padding: 16px;
    font-size: 14px;
    letter-spacing: .2em;
    background: transparent;
    border: 1px solid var(--text);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }

  .start-btn:hover{
    background: var(--text);
    color: #121212;
  }

  .start-btn:active{
    transform: scale(.99);
  }

  .start-btn:focus-visible{
    outline: 2px solid var(--text);
    outline-offset: 3px;
  }

  .hint{
    margin: 22px 0 0;
    font-size: 12px;
    color: var(--text-dim);
  }

  kbd{
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--text);
  }

  @media (max-width: 380px){
    .panel{ padding: 2rem 1.25rem 1.75rem; }
  }
</style>
</head>
<body>

<div id="stage" aria-hidden="true"></div>

<div id="controls">
  <div class="panel">
    <p class="eyebrow mono">PERFORMANCE FADE INSTRUMENT</p>
    <h1 class="mono">Heidi's<br>Color Machine</h1>

    <canvas id="preview" width="400" height="14"></canvas>

    <p class="duration-label mono">DURATION</p>
    <div class="duration-row">
      <div class="time-field">
        <input class="time-value mono" id="min-input" type="number" min="0" max="59" value="4" inputmode="numeric" aria-label="Minutes">
        <span class="field-label mono" aria-hidden="true">MIN</span>
      </div>
      <span class="colon mono">:</span>
      <div class="time-field">
        <input class="time-value mono" id="sec-input" type="number" min="0" max="59" value="0" inputmode="numeric" aria-label="Seconds">
        <span class="field-label mono" aria-hidden="true">SEC</span>
      </div>
    </div>

    <button id="start-btn" class="start-btn mono">START</button>

    <p class="hint">press <kbd>q</kbd> anytime to stop and bring back these controls</p>
  </div>
</div>

<script>
(function(){

  // ---- color math (OKLab interpolation) ----

  var KEYFRAMES = [
    [255,255,255],   // white
    [255,0,255],     // magenta
    [0,174,239],     // cyan-blue
    [0,153,51],       // green
    [139,69,19],      // brown
    [255,255,255]     // back to white
  ];
  var SEGMENTS = KEYFRAMES.length - 1;

  function srgbToLinear(c){
    c = c / 255;
    return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  }

  function linearToSrgb(c){
    c = c <= 0.0031308 ? c * 12.92 : 1.055 * Math.pow(c, 1 / 2.4) - 0.055;
    return Math.round(Math.min(1, Math.max(0, c)) * 255);
  }

  function rgbToOklab(r, g, b){
    var lr = srgbToLinear(r), lg = srgbToLinear(g), lb = srgbToLinear(b);
    var l = 0.4122214708 * lr + 0.5363325363 * lg + 0.0514459929 * lb;
    var m = 0.2119034982 * lr + 0.6806995451 * lg + 0.1073969566 * lb;
    var s = 0.0883024619 * lr + 0.2817188376 * lg + 0.6299787005 * lb;
    var l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
    return [
      0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_,
      1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_,
      0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_
    ];
  }

  function oklabToRgb(L, a, b){
    var l_ = L + 0.3963377774 * a + 0.2158037573 * b;
    var m_ = L - 0.1055613458 * a - 0.0638541728 * b;
    var s_ = L - 0.0894841775 * a - 1.2914855480 * b;
    var l = l_ * l_ * l_, m = m_ * m_ * m_, s = s_ * s_ * s_;
    var lr = 4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
    var lg = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
    var lb = -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s;
    return [linearToSrgb(lr), linearToSrgb(lg), linearToSrgb(lb)];
  }

  function oklabLerp(c0, c1, t){
    var lab0 = rgbToOklab(c0[0], c0[1], c0[2]);
    var lab1 = rgbToOklab(c1[0], c1[1], c1[2]);
    var L = lab0[0] + (lab1[0] - lab0[0]) * t;
    var a = lab0[1] + (lab1[1] - lab0[1]) * t;
    var b = lab0[2] + (lab1[2] - lab0[2]) * t;
    return oklabToRgb(L, a, b);
  }

  function colorAt(p){
    var scaled = p * SEGMENTS;
    var seg = Math.min(SEGMENTS - 1, Math.floor(scaled));
    var t = scaled - seg;
    return oklabLerp(KEYFRAMES[seg], KEYFRAMES[seg + 1], t);
  }

  function toCss(c){
    return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
  }

  // ---- elements ----

  var stage = document.getElementById('stage');
  var controls = document.getElementById('controls');
  var startBtn = document.getElementById('start-btn');
  var minInput = document.getElementById('min-input');
  var secInput = document.getElementById('sec-input');
  var preview = document.getElementById('preview');
  var previewCtx = preview.getContext('2d');

  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- duration helpers ----

  function clampField(input){
    var v = parseInt(input.value, 10);
    if (isNaN(v)) v = 0;
    v = Math.min(59, Math.max(0, v));
    input.value = v;
  }

  function durationMs(){
    var min = parseInt(minInput.value, 10) || 0;
    var sec = parseInt(secInput.value, 10) || 0;
    var total = (min * 60 + sec) * 1000;
    return Math.max(total, 5000); // floor so it never strobes
  }

  [minInput, secInput].forEach(function(input){
    input.addEventListener('input', function(){ clampField(input); });
  });

  // ---- landing-page live preview ----

  var previewRAF = null;
  var previewStart = null;

  function sizePreviewCanvas(){
    var rect = preview.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    preview.width = Math.max(1, Math.round(rect.width * dpr));
    preview.height = Math.max(1, Math.round(rect.height * dpr));
  }

  function drawPreviewFrame(now){
    var w = preview.width, h = preview.height;
    for (var x = 0; x < w; x++){
      var c = colorAt(x / (w - 1));
      previewCtx.fillStyle = toCss(c);
      previewCtx.fillRect(x, 0, 1, h);
    }
    if (!reducedMotion){
      var dur = durationMs();
      var elapsed = (now - previewStart) % dur;
      var mx = (elapsed / dur) * w;
      previewCtx.fillStyle = 'rgba(0,0,0,.5)';
      previewCtx.fillRect(mx - 1, 0, 2, h);
      previewCtx.fillStyle = 'rgba(255,255,255,.9)';
      previewCtx.fillRect(mx - 1, 0, 2, Math.max(2, h * 0.4));
    }
  }

  function previewLoop(now){
    drawPreviewFrame(now);
    if (!reducedMotion){
      previewRAF = requestAnimationFrame(previewLoop);
    }
  }

  function startPreview(){
    sizePreviewCanvas();
    previewStart = performance.now();
    if (reducedMotion){
      drawPreviewFrame(previewStart);
    } else {
      previewRAF = requestAnimationFrame(previewLoop);
    }
  }

  function stopPreview(){
    if (previewRAF) cancelAnimationFrame(previewRAF);
    previewRAF = null;
  }

  window.addEventListener('resize', function(){
    if (!document.body.classList.contains('stage-mode')) sizePreviewCanvas();
  });

  // ---- main fade ----

  var stageRAF = null;
  var stageStart = null;
  var wakeLock = null;

  function stageLoop(now){
    if (stageStart === null) stageStart = now;
    var dur = durationMs();
    var elapsed = (now - stageStart) % dur;
    stage.style.background = toCss(colorAt(elapsed / dur));
    stageRAF = requestAnimationFrame(stageLoop);
  }

  async function startFade(){
    stopPreview();
    controls.classList.add('hidden');
    controls.setAttribute('aria-hidden', 'true');
    stage.classList.add('active');
    document.body.classList.add('stage-mode');

    try { await document.documentElement.requestFullscreen(); } catch (e) {}
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {}

    stageStart = null;
    stageRAF = requestAnimationFrame(stageLoop);
  }

  function stopFade(){
    if (stageRAF) cancelAnimationFrame(stageRAF);
    stageRAF = null;
    stage.classList.remove('active');
    document.body.classList.remove('stage-mode');
    controls.classList.remove('hidden');
    controls.setAttribute('aria-hidden', 'false');

    if (wakeLock){
      wakeLock.release().catch(function(){});
      wakeLock = null;
    }
    if (document.fullscreenElement){
      document.exitFullscreen().catch(function(){});
    }

    startPreview();
  }

  startBtn.addEventListener('click', startFade);

  document.addEventListener('keydown', function(e){
    if (e.key.toLowerCase() === 'q' && document.body.classList.contains('stage-mode')){
      stopFade();
    }
  });

  // Safety net: if fullscreen is exited by any means (Escape, alt-tab, etc.)
  // while the stage is running, resurface controls rather than leaving a
  // half-broken windowed/cursor-hidden state.
  document.addEventListener('fullscreenchange', function(){
    if (!document.fullscreenElement && document.body.classList.contains('stage-mode')){
      stopFade();
    }
  });

  startPreview();

})();
</script>

</body>
</html>
